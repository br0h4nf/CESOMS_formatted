<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | CESOMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body class="auth-body">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>

    <main class="auth-shell auth-shell-wide">
      <section class="auth-card">
        <p class="eyebrow">New student account</p>
        <h1>Create Account</h1>
        <p class="auth-copy">
          This registration form creates a new <code>STUDENT</code> record with an active account status.
        </p>
        <p class="auth-hint">Use a password with at least 8 characters.</p>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        {% if success %}
        <p class="auth-success">{{ success }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
          <div class="auth-grid">
            <label class="field">
              <span>Student ID</span>
              <input type="text" name="student_id" placeholder="STU-205" value="{{ form_values.student_id }}" required />
            </label>

            <label class="field">
              <span>Class Year</span>
              <input type="text" name="class_year" placeholder="2028" value="{{ form_values.class_year }}" required />
            </label>

            <label class="field">
              <span>First Name</span>
              <input type="text" name="first_name" placeholder="Avery" value="{{ form_values.first_name }}" required />
            </label>

            <label class="field">
              <span>Last Name</span>
              <input type="text" name="last_name" placeholder="Coleman" value="{{ form_values.last_name }}" required />
            </label>

            <label class="field field-full">
              <span>Email</span>
              <input type="email" name="email" placeholder="student@school.edu" value="{{ form_values.email }}" required />
            </label>

            <label class="field field-full">
              <span>Major</span>
              <input type="text" name="major" placeholder="Computer Science" value="{{ form_values.major }}" required />
            </label>

            <label class="field">
              <span>Password</span>
              <input type="password" name="password" placeholder="At least 8 characters" required />
            </label>

            <label class="field">
              <span>Confirm Password</span>
              <input type="password" name="confirm_password" placeholder="Re-enter password" required />
            </label>
          </div>

          <button type="submit" class="button-solid">Create Account</button>
        </form>

        <p class="auth-note">
          Already have an account? <a href="{{ url_for('login') }}">Back to login</a>.
        </p>
      </section>
    </main>
  </body>
</html>
